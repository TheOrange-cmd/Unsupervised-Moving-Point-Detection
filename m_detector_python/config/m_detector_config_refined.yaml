# --- Global/Input Configuration ---
nuscenes:
  version: "v1.0-mini"
  dataroot: "/datasets/nuscenes"
  lidar_sensor_name: "LIDAR_TOP"
  label_path: "/home/drugge/staff-umbrella/TeamHolgerResearch/drugge/nuscenes_labels_interpolated"
  # This can later also have roots for other datasets such as waymo, kitti, etc.
  # Or use the omni dataset Ted (Teddy) de Vries Lentsch is working on. 
processing_settings: 
  skip_frames: 0
  max_frames: null
mdetector_output_paths: # Renamed
  save_path: "/home/drugge/staff-umbrella/TeamHolgerResearch/drugge/m_detector_output" # Directory where M-Detector outputs will be saved
  scene_indices_to_run: [1]
validation_params: # Renamed
  gt_velocity_threshold: 1.0 # For comparing against GT
  # coordinate_tolerance_for_verification: 0.01 # If used in validation scripts

# --- M-Detector Algorithm Configuration ---
m_detector:
  # Point Cloud Pre-Filtering (Applied before DI creation)
  point_pre_filtering:
    max_range_meters: 50.0
    min_range_meters: 1.0

  # Depth Image Construction & Library
  depth_image:
    # construction_interval_T_sec: 0.05 # Usually fixed by sensor, maybe less configurable
    resolution_h_deg: 0.4
    resolution_v_deg: 1.4
    phi_min_rad: -3.1415926535
    phi_max_rad: 3.1415926535
    theta_min_rad: -0.535
    theta_max_rad: 0.186
    library_size: 20

  # Occlusion Check Parameters (General for all tests that use it)
  # These define how "occlusion" is determined between a point and historical data
  occlusion_determination:
    epsilon_depth: 0.5   # (εd) General depth threshold for occlusion
    # For pixel-summary based check (currently used by check_occlusion_batch for Test 1 history)
    pixel_neighborhood_h: 2 # (nh)
    pixel_neighborhood_v: 1 # (nv)
    # For finer point-to-point check (to be used in Tests 2 & 3)
    angular_neighborhood_h_deg: 4.0 # (εh)
    angular_neighborhood_v_deg: 2.0 # (εv)

  # Event Detection Tests
  event_detection_logic:
    test1_perpendicular:
      num_historical_DIs_N: 3
      min_occluding_DIs_M1: 2
    test2_parallel_away:
      num_historical_DIs_M2: 3
    test3_parallel_towards:
      num_historical_DIs_M3: 3
    # Note: Map consistency is applied *within* each test's logic

  # Map Consistency Check (Applied within each test if an occlusion is found)
  map_consistency:
    enabled: true
    time_window_past_s: 0.3 # How far back to look for static map points
    # time_window_future_s: 0.25 # Will be used if bidirectional is implemented
    # Thresholds for matching a point to a historical static map point
    epsilon_phi_deg: 2.0
    epsilon_theta_deg: 2.0
    epsilon_depth_forward_m: 1.0
    epsilon_depth_backward_m: 1.0
    # Logic for deciding if enough consistency is found
    threshold_mode: "count" # 'count' or 'ratio'
    threshold_value_count: 1 # Min DIs with a consistent static point
    # threshold_value_ratio: 0.5 # Min ratio of DIs
    static_labels_for_check: # Labels in historical DIs considered static
      - "OCCLUDED_BY_IMAGE" # Key one from paper's spirit
      - "UNDETERMINED"      # Often implies static if not clearly dynamic
      # - "NON_EVENT" # If you have an explicit non-event label from init
      # - "STATIC_CONFIRMED_BY_MAP" # If you add this as an internal label

  # Clustering & Region Growth (Frame-Out Mode Refinement)
  frame_refinement:
    enabled: false # Set to true to enable these steps
    clustering:
      voxel_size_m: 0.3 # Lv
      dbscan_eps: 0.5 # Example, needs tuning based on voxel centers
      dbscan_min_samples: 3 # Example
    region_growth:
      expansion_factor_aabb: 2.0 # "twice its size"
      # RANSAC params for ground plane fitting would go here if used

  # Initialization Phase (for initial DIs before full processing)
  initialization_phase:
    num_sweeps_for_initial_map: 5

  # --- Bidirectional Temporal Processing (Advanced/Future) ---
  # This section can be kept separate and clearly marked as for future/advanced use.
  # The complex decision rules you have under 'temporal_processing' belong here.
  bidirectional_aggregation:
    enabled: false
    # past_window_size: 5
    # future_window_size: 1
    # ... and all the ..._outcome rules ...
    # past_occluding_mc_true_outcome: "STATIC"
    # ...
    # default_ambiguous_outcome: "UNDETERMINED"
    # both_map_consistent_override: "STATIC"

# --- Visualization Configuration (Can be a separate file too) ---
visualization:
  video_generation:
    fps: 20
    default_scene_index: 1 # Example, choose a scene index from your dataset
    output_directory: "/home/drugge/staff-umbrella/TeamHolgerResearch/drugge/m_detector_output" # Store comparison videos here
    figure_size_side_by_side: [20, 10] # Inches: [width, height] for the whole figure with 2 subplots
    
    bev_range_meters: 50
    point_size_all_lidar: 0.2
    point_color_all_lidar: 'lightgrey'
    point_alpha_all_lidar: 0.5
    
    point_size_dynamic_gt: 2.5
    point_size_dynamic_pred: 2.0
    point_size_occluded_pred: 1.5 # For MDet: Occluded points
    show_mdet_occluded_points: False # Whether to plot M-Detector's occluded points

    # Ego vehicle plotting config (can be used by plot_bev_frame)
    ego_vehicle:
      marker: 'o'
      markersize: 8
      color: 'darkred' # Make it distinct for comparison plots
      arrow_length: 2.0
      arrow_head_width: 0.8
      arrow_head_length: 1.0
      arrow_fc: 'darkred'
      arrow_ec: 'darkred'
      arrow_zorder: 10
  # k3d_plot: ...