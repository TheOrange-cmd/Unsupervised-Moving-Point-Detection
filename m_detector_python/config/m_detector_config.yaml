# config/m_detector_config.yaml

# --- NuScenes Specific Configuration ---
nuscenes:
  version: "v1.0-mini" # Options: "v1.0-mini", "v1.0-trainval", "v1.0-test"
  dataroot: "/datasets/nuscenes" # IMPORTANT: Change this to your NuScenes data path!
  lidar_sensor_name: "LIDAR_TOP"
  # the label_path is where we store our label files created using interpolation and extrapolation from the manual annotations.
  # this way, we can validate our algorithm with *all* lidar sweeps (20 Hz), not just the keyframes with manual annotations (2 Hz). 
  label_path: "/home/drugge/staff-umbrella/TeamHolgerResearch/drugge/nuscenes_labels_interpolated"

processing:
  skip_frames: 0
  max_frames: 30 # set to null (without quotes) to process all frames

mdetector_output:
  save_path: "/home/drugge/staff-umbrella/TeamHolgerResearch/drugge/m_detector_output" # Directory where M-Detector outputs will be saved
  scene_indices_to_run: [1] # List of scene indices to run M-Detector on, or 'all'

# --- M-Detector General Parameters ---
# Based on the paper (Nature Communications | (2024) 15:345) and Supplementary Info.
# These will likely require tuning for NuScenes and specific LiDARs.

temporal_processing:
  bidirectional: true  # Enable/disable bidirectional processing
  past_window_size: 1  # Number of past frames to use
  future_window_size: 1  # Number of future frames to use
  past_weight: 1.0  # Weight for past frame results (optional)
  future_weight: 1.0  # Weight for future frame results (optional)
  # --- Final Labeling Logic Configuration ---
  # Determines how raw occlusion and map consistency (mc) combine for past evidence.
  # If past_raw_occ == OCCLUDING_IMAGE (dynamic signal):
  #   - if is_mc_past == True: What is the effective past state?
  #     Options: "STATIC" (map consistency overrides), "DYNAMIC" (occlusion overrides), "UNDETERMINED"
  past_occluding_mc_true_outcome: "STATIC"

  # Determines how raw occlusion and map consistency (mc) combine for future evidence.
  # If future_raw_occ implies dynamic for center_pt (OCCLUDING_IMAGE, OCCLUDED_BY_IMAGE, EMPTY_IN_IMAGE):
  #   - if is_mc_future == True: What is the effective future state?
  #     Options: "STATIC" (map consistency overrides), "DYNAMIC" (occlusion overrides), "UNDETERMINED"
  future_dynamic_mc_true_outcome: "STATIC"

  # Decision rules based on effective_past_state (EPS) and effective_future_state (EFS)
  # EPS/EFS can be: DYNAMIC (Occluding), STATIC (Occluded), AMBIGUOUS_PAST (Empty), UNDETERMINED
  # Note: For EFS, EMPTY_IN_IMAGE is treated as DYNAMIC. OCCLUDED_BY_IMAGE is also DYNAMIC for center_pt.

  # Rule 1: If EPS is DYNAMIC and EFS is DYNAMIC
  # Options: "DYNAMIC", "UNDETERMINED" (if conflicting strong dynamics needs caution)
  both_dynamic_outcome: "DYNAMIC"

  # Rule 2: If EPS is DYNAMIC and EFS is STATIC
  # Options: "DYNAMIC", "STATIC", "UNDETERMINED"
  past_dynamic_future_static_outcome: "DYNAMIC"

  # Rule 3: If EPS is DYNAMIC and EFS is UNDETERMINED
  # Options: "DYNAMIC", "UNDETERMINED"
  past_dynamic_future_undetermined_outcome: "DYNAMIC"

  # Rule 4: If EPS is STATIC and EFS is DYNAMIC
  # Options: "DYNAMIC", "STATIC", "UNDETERMINED"
  past_static_future_dynamic_outcome: "DYNAMIC" # Common: static object starts moving

  # Rule 5: If EPS is STATIC and EFS is STATIC
  # Options: "STATIC", "UNDETERMINED"
  both_static_outcome: "STATIC"

  # Rule 6: If EPS is STATIC and EFS is UNDETERMINED
  # Options: "STATIC", "UNDETERMINED"
  past_static_future_undetermined_outcome: "STATIC"

  # Rule 7: If EPS is AMBIGUOUS_PAST (EMPTY_IN_IMAGE) and EFS is DYNAMIC
  # Options: "DYNAMIC", "UNDETERMINED"
  past_empty_future_dynamic_outcome: "DYNAMIC" # Newly seen object is dynamic

  # Rule 8: If EPS is AMBIGUOUS_PAST (EMPTY_IN_IMAGE) and EFS is STATIC
  # Options: "STATIC", "UNDETERMINED"
  past_empty_future_static_outcome: "STATIC" # Newly seen object is static

  # Rule 9: If EPS is AMBIGUOUS_PAST (EMPTY_IN_IMAGE) and EFS is UNDETERMINED
  # Options: "UNDETERMINED", "EMPTY" (if you want to preserve EMPTY as a label)
  past_empty_future_undetermined_outcome: "UNDETERMINED"

  # Rule 10: If EPS is UNDETERMINED (and not covered by AMBIGUOUS_PAST)
  # (Similar rules for past_undetermined_future_dynamic, past_undetermined_future_static)
  # For brevity, we can have a general default.

  # Default outcome if no specific rule matches or for fully undetermined cases
  # (e.g., EPS=UNDETERMINED, EFS=UNDETERMINED)
  # Options: "UNDETERMINED", "STATIC", "DYNAMIC" (use with caution)
  default_ambiguous_outcome: "UNDETERMINED"

  # Special override: If both is_mc_past AND is_mc_future are true, regardless of occlusion.
  # This is a very strong signal for static.
  # Options: "STATIC" (recommended), "USE_EFFECTIVE_STATES_LOGIC" (to disable override)
  both_map_consistent_override: "STATIC" # If "STATIC", this returns OcclusionResult.OCCLUDED_BY_IMAGE


video_generation:
  fps: 20
  default_scene_index: 0 # Example, choose a scene index from your dataset
  output_directory: "/home/drugge/staff-umbrella/TeamHolgerResearch/drugge/m_detector_output" # Store comparison videos here

  figure_size_side_by_side: [20, 10] # Inches: [width, height] for the whole figure with 2 subplots
  
  bev_range_meters: 50
  point_size_all_lidar: 0.2
  point_color_all_lidar: 'lightgrey'
  point_alpha_all_lidar: 0.5
  
  point_size_dynamic_gt: 2.5
  point_size_dynamic_pred: 2.0
  point_size_occluded_pred: 1.5 # For MDet: Occluded points
  show_mdet_occluded_points: False # Whether to plot M-Detector's occluded points

  # Ego vehicle plotting config (can be used by plot_bev_frame)
  ego_vehicle:
    marker: 'o'
    markersize: 8
    color: 'darkred' # Make it distinct for comparison plots
    arrow_length: 2.0
    arrow_head_width: 0.8
    arrow_head_length: 1.0
    arrow_fc: 'darkred'
    arrow_ec: 'darkred'
    arrow_zorder: 10

# Depth Image Parameters
depth_image:
  # Time interval in seconds to accumulate points for one depth image.
  # E.g., NuScenes LiDAR is typically 20Hz, so sweep duration is 0.05s.
  # The paper mentions T, e.g., 100ms. If T is larger than sweep duration,
  # multiple sweeps could contribute to one depth image, or it's the interval
  # at which a new depth image (based on the latest sweep) is finalized.
  # Let's assume one depth image per LiDAR sweep for NuScenes initially.
  construction_interval_T_sec: 0.05 # Corresponds to NuScenes sweep time

  # Angular resolution for the depth image (degrees per pixel).
  # Velodyne HDL-32E (common in NuScenes):
  # Horizontal: ~0.1° to ~0.4° (density varies).
  # Vertical: 32 beams, ~1.33° between beams. FoV: +10.67° to -30.67°.
  resolution_h_deg: 0.4   # Azimuthal (phi) resolution
  resolution_v_deg: 1.4   # Polar/Elevation (theta) resolution

  # Field of View for the depth image.
  # Azimuthal: Full 360 degrees.
  phi_min_rad: -3.1415926535 # -pi
  phi_max_rad: 3.1415926535  # +pi
  # Elevation: Based on typical LiDARs like Velodyne HDL-32E.
  # Using elevation angle (theta) where 0 is horizontal, +ve is up.
  theta_min_rad: -0.535  # Approx -30.67 degrees (HDL-32E fov_down)
  theta_max_rad: 0.186   # Approx +10.67 degrees (HDL-32E fov_up)

  # Maximum number of depth images to keep in the library (sliding window).
  library_size: 20        # e.g., keep history for 1 second if T=0.05s (20Hz)
  max_points_per_pixel: 50

# Occlusion Check Parameters (Values are examples, need tuning)
occlusion_check:
  epsilon_depth_occlusion: 0.7   # (εd) meters. Depth threshold for occlusion.
  neighbor_search_pixels_h: 1    # (nh) Number of horizontal neighbor pixels to check (0 for center only, 1 for 3xN_v).
  neighbor_search_pixels_v: 1    # (nv) Number of vertical neighbor pixels to check (0 for center only, 1 for N_h x 3).
  angular_threshold_deg_h: 2.0   # (εh) Horizontal angular threshold for point-based check (degrees).
  angular_threshold_deg_v: 2.0   # (εv) Vertical angular threshold for point-based check (degrees).



map_consistency_check:
  enabled: false # Overall toggle for this phase
  consistency_threshold: 0.7 # Ratio of frames that must be consistent
  # How many of the most recent (but older than current) DIs to check against
  map_consistency_time_window_past_s: 5
  map_consistency_time_window_future_s: 5 # New parameter
  # Angular thresholds for considering a stored static point "aligned" with the point_to_check
  # These are in the historical DI's frame where both points are projected
  epsilon_phi_map_deg: 1.0  # Azimuthal tolerance in degrees
  epsilon_theta_map_deg: 1.0 # Polar tolerance in degrees
  # Depth thresholds (in meters) for considering a stored static point "at the same depth"
  # d_static - epsilon_depth_backward_map <= d_current_projected <= d_static + epsilon_depth_forward_map
  epsilon_depth_forward_map: 0.3  # Meters
  epsilon_depth_backward_map: 0.3 # Meters
  # Labels in historical DIs that are considered "static" or "non-event" for map consistency
  static_labels_for_map_check:
    - "NON_EVENT" # From initialization phase
    - "UNDETERMINED" # If an occlusion check was inconclusive, it's likely static
    - "STATIC_CONFIRMED_BY_MAP" # If previously confirmed as static by this check
    - "PENDING_CLASSIFICATION" # Default label for future points - necessary if comparing current points with future ones
    # Add any other labels that signify a point is part of the static map

# Event Detection Test Parameters (Values are examples, need tuning)
event_tests:
  test1_N_depth_images: 5     # Test 1: Num recent depth images to check
  test1_M1_threshold: 2       # Test 1: Min occluded background images
  test2_M2_depth_images: 3    # Test 2: Num images for moving away check
  test3_M3_depth_images: 3    # Test 3: Num images for moving towards check

# Initialization Phase
initialization:
  # number of initial sweeps to build initial depth images before starting event detection.
  num_initial_sweeps_for_map: 1 

# Point Processing
filtering:
  # Max range for points to be considered for M-detector (meters)
  max_point_range_meters: 80.0
  min_point_range_meters: 1.0 # Ignore points too close to the sensor