# --- Global/Input Configuration ---
nuscenes:
  version: "v1.0-mini"
  dataroot: "/datasets/nuscenes"
  label_path: "/home/drugge/Unsupervised-Moving-Point-Detection/m_detector_python/labels"
# This can later also have sections for other datasets such as waymo, kitti, etc.
# Or use the omni dataset Ted (Teddy) de Vries Lentsch is working on. 
processing_settings: 
  # 'cpu' or 'cuda'
  device: "cuda" 
  # List of GPU IDs to use. If device is 'cuda', this MUST be present.
  # An empty list [] means use all available GPUs.
  # e.g., [0, 2, 5] to use GPUs 0, 2, and 5.
  gpu_ids: [ 1, 3, 4, 5, 6, 7]
  skip_frames: 0 # number of frames to skip in the sequence - useful for debugging
  max_frames: -1 # provide an int, or -1 to process the entire sequence
  workers_per_gpu: 4 # How many trials to run per gpu with optuna/ray
  random_seed: 42 

  # Which scenes to process, 'all' or a list, e.g.: [1,] or [0, 3, 5]
  scene_indices_to_run: 'all' 
  # scene_indices_to_run: [1, ]

logging_settings:
  log_dir: "logs"
  # Controls which trials get a verbose DEBUG log file.
  # Options: 'all', 'none', or a list of trial numbers, e.g., [0, 5, 10]
  log_detailed_for_trials: []

validation_params:
  gt_velocity_threshold: 1.0 # For comparing against GT
  # coordinate_tolerance_for_verification: 0.01 # If used in validation scripts

adaptive_epsilon_params_schema: &adaptive_epsilon_defaults
  enabled: false
  # di_base will be taken from the original epsilon it's adapting (e.g., epsilon_depth_occlusion)
  dthr: 30.0      # Depth (meters) at which threshold starts increasing/changing
  kthr: 0.05      # Linear rate (positive for increase, negative for decrease if d_anchor > dthr)
  dmax: 2.0       # Maximum cap for the adaptive threshold (e.g., di_base * 4 or a fixed value)
  dmin: 0.1       # Minimum cap for the adaptive threshold (e.g., di_base * 0.2 or a fixed value)

# --- M-Detector Algorithm Configuration ---
m_detector:
  # Point Cloud Pre-Filtering (Applied before DI creation)
  point_pre_filtering:
    enabled: true
    max_range_meters: 50.0
    min_range_meters: 2.5

  # Depth Image Construction & Library
  depth_image:
    resolution_h_deg: 0.4
    resolution_v_deg: 1.26
    phi_min_rad: -3.1415926535
    phi_max_rad: 3.1415926535
    theta_min_rad: -0.535
    theta_max_rad: 0.186

  # Occlusion Check Parameters (Initial, fast check)
  occlusion_determination:
    epsilon_depth: 0.1   # (εd) General depth threshold for occlusion
    adaptive_epsilon_depth_config:
      <<: *adaptive_epsilon_defaults
      enabled: true                 
      dthr: 5.0    
      kthr: 0.01   
      dmax: 0.5   
      dmin: 0.05   
    pixel_neighborhood_h: 2 # (nh)
    pixel_neighborhood_v: 1 # (nv)

  # Detailed Occlusion Check (Precise, for Event Tests)
  detailed_occlusion_check:
    epsilon_depth: 0.1 # Base epsilon for the detailed check
    angular_neighborhood_h_deg: 0.29 # (εh) -> 0.29 in paper
    angular_neighborhood_v_deg: 0.4  # (εv) -> 0.4 in paper

  # Event Detection Tests
  event_detection_logic:
    test2_parallel_away:
      num_historical_DIs_M2: 2
    test3_parallel_towards:
      num_historical_DIs_M3: 3
    test4_perpendicular:
      num_historical_DIs_N: 15
      min_occluding_DIs_M4: 4

  # Map Consistency Check
  map_consistency:
    enabled: true
    num_past_sweeps_for_mcc: 10 
    epsilon_phi_deg: 0.57
    epsilon_theta_deg: 1.72
    epsilon_depth_forward_m: 1.0
    adaptive_epsilon_forward_config:
      <<: *adaptive_epsilon_defaults
      enabled: true
      dthr: 20.0
      kthr: 0.07
      dmax: 3.0
      dmin: 0.1
    epsilon_depth_backward_m: 0.3
    adaptive_epsilon_backward_config:
      <<: *adaptive_epsilon_defaults
      enabled: true
      dthr: 20.0
      kthr: 0.03
      dmax: 1.0
      dmin: 0.05
    static_confidence_threshold: 0.2 
    interpolation_enabled: true
    interpolation_min_depth_m: 15.0
    interpolation_max_depth_m: 50.0
    interpolation_max_neighbors_to_consider: 20
    interpolation_max_triplets_to_try: 100
    interpolation_fallback_to_direct_comparison: true

  ransac_ground_params: 
    enabled: true
    xyradius_threshold: 25.0
    z_min_threshold: -2.84023
    z_max_threshold: -0.84023
    num_trials: 50
    inlier_threshold: 0.3
    ground_threshold: 0.3

  # Clustering & Region Growth (Frame-Out Mode Refinement)
  frame_refinement:
    enabled: false # Set to true to enable these steps
    clustering:
      voxel_size_m: 0.3 # Lv
      dbscan_eps: 0.5 
      dbscan_min_samples: 3 
    region_growth:
      expansion_factor_aabb: 2.0 # "twice its size"

  # Initialization Phase (how many sweeps we want to have in history before we start processing)
  initialization_phase:
    num_sweeps_for_initial_map: 10

  # --- Bidirectional Temporal Processing (Advanced/Future) ---
  bidirectional_aggregation:
    enabled: false