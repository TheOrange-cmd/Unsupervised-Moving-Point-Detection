dyn_obj:
    points_topic: "/cloud_registered_body"
    odom_topic: "/aft_mapped_to_init"
    frame_id: "camera_init"
    pc_topic: "/lidar_top"

    dataset: 1 #0 for kitti, 1 for nuscenes, 2 for waymo, 3 for avia
    buffer_delay: 0.1
    buffer_size: 500000
    points_num_perframe: 50000
    depth_map_dur: 0.2
    max_depth_map_num: 10
    max_pixel_points: 50
    frame_dur: 0.05
    self_x_f: 2.2
    self_x_b: -1.2
    self_y_l: 0.7
    self_y_r: -0.7
    blind_dis: 0.2
    fov_up: 10.0
    fov_down: -30.0
    fov_left: 180.0
    fov_right: -180.0
    fov_cut: 0
    
